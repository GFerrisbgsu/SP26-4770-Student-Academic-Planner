spring.application.name=smart-academic-calendar

# Optional .env support in repo root
spring.config.import=optional:file:.env[.properties]

# Database placeholders (overridden in dev/test)
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

# JPA defaults
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Database Seeding
app.seeding.enabled=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.jwt.issuer=smart-academic-calendar

# WebAuthn / Passkeys
# Origin must match where the frontend is served (not the backend)
app.webauthn.rp.id=${WEBAUTHN_RP_ID:localhost}
app.webauthn.rp.name=Smart Academic Calendar
app.webauthn.origin=${WEBAUTHN_ORIGIN:http://localhost:3000}
app.webauthn.challenge-duration-seconds=600

# Resend Email API
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${EMAIL_FROM:${RESEND_FROM_EMAIL:noreply@smartacademiccalendar.com}}

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.flywaydb.core=DEBUG
