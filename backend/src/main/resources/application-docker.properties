# ============================================
# DOCKER PROFILE CONFIGURATION
# Used when running in Docker containers
# ============================================

# Database Configuration (uses Docker service names)
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://postgres:5432/appdb}
spring.datasource.username=${DATASOURCE_USERNAME:appuser}
spring.datasource.password=${DATASOURCE_PASSWORD:apppass}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging (reduced for production)
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb.core=INFO
logging.level.root=INFO

# Server
server.port=8080

# CORS - Allow frontend container and local development
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://frontend:3000

# Email configuration
# Disable real email sending in development Docker environment
# Set to true only when RESEND_API_KEY is configured for production
app.mail.send-real-emails=false
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${EMAIL_FROM:${RESEND_FROM_EMAIL:noreply@smartacademiccalendar.com}}

# Frontend URL for email links (Docker uses port 3000)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-minutes=${JWT_ACCESS_EXPIRATION_MINUTES:15}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}
app.jwt.refresh-expiration-days-remember-me=${JWT_REFRESH_EXPIRATION_DAYS_REMEMBER_ME:30}
app.jwt.issuer=smart-academic-calendar

# WebAuthn / Passkeys
# Origin must match where the frontend is served (not the backend)
# In Docker: frontend runs on port 3000
app.webauthn.rp.id=${WEBAUTHN_RP_ID:localhost}
app.webauthn.rp.name=Smart Academic Calendar
app.webauthn.origin=${WEBAUTHN_ORIGIN:http://localhost:3000}
app.webauthn.challenge-duration-seconds=600
