# Dev profile - PostgreSQL with Flyway migrations
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

# HikariCP Connection Pooling (defaults - automatically configured by Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Flyway enabled for dev
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Resend Email API configuration
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${EMAIL_FROM:${RESEND_FROM_EMAIL:noreply@smartacademiccalendar.com}}
app.mail.send-real-emails=${SEND_REAL_EMAILS:true}

# Frontend URL for email links
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-minutes=${JWT_ACCESS_EXPIRATION_MINUTES:15}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}
app.jwt.refresh-expiration-days-remember-me=${JWT_REFRESH_EXPIRATION_DAYS_REMEMBER_ME:30}
app.jwt.issuer=smart-academic-calendar

# WebAuthn / Passkeys
app.webauthn.rp.id=${WEBAUTHN_RP_ID:localhost}
app.webauthn.rp.name=Smart Academic Calendar
app.webauthn.origin=${WEBAUTHN_ORIGIN:http://localhost:8080}
app.webauthn.challenge-duration-seconds=600

# Logging
logging.level.org.flywaydb=DEBUG
