# ============================================
# PRODUCTION PROFILE CONFIGURATION
# Used when deployed to production server
# ============================================

# Database Configuration (use environment variables for secrets)
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway (for database schema management)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging (production should log less verbose)
logging.level.root=INFO
logging.level.com.sap.smart_academic_calendar=INFO
logging.level.org.flywaydb=INFO

# Server configuration
server.servlet.context-path=/
server.error.whitelabel.enabled=false

# Performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration (secure secrets from environment)
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-minutes=${JWT_ACCESS_EXPIRATION_MINUTES:15}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}
app.jwt.refresh-expiration-days-remember-me=${JWT_REFRESH_EXPIRATION_DAYS_REMEMBER_ME:30}
app.jwt.issuer=smart-academic-calendar

# Frontend URL for email links
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Email Configuration
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${EMAIL_FROM:${RESEND_FROM_EMAIL:noreply@smartacademiccalendar.com}}
app.mail.send-real-emails=${SEND_REAL_EMAILS:true}

# WebAuthn / Passkeys (secure configuration from environment)
app.webauthn.rp.id=${WEBAUTHN_RP_ID}
app.webauthn.rp.name=Smart Academic Calendar
app.webauthn.origin=${WEBAUTHN_ORIGIN}
app.webauthn.challenge-duration-seconds=600
