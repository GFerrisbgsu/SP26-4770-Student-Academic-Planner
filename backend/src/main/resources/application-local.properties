spring.datasource.url=jdbc:h2:mem:smartAcademicCalendar
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP Connection Pooling (defaults - automatically configured by Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.flyway.enabled=true

# JWT (base64-encoded 32-byte secret for local development)
app.jwt.secret=bG9jYWwtZGV2LXNlY3JldC0zMi1ieXRlcy1sb25nISE=
app.jwt.access-expiration-minutes=15
app.jwt.refresh-expiration-days=7
app.jwt.refresh-expiration-days-remember-me=30
app.jwt.issuer=smart-academic-calendar

# WebAuthn / Passkeys
# Origin must match where the frontend is served (not the backend)
# In local dev: Vite runs on port 5173
app.webauthn.rp.id=localhost
app.webauthn.rp.name=Smart Academic Calendar
app.webauthn.origin=http://localhost:5173
app.webauthn.challenge-duration-seconds=600

# Resend Email API configuration
# Set RESEND_API_KEY environment variable for production
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${EMAIL_FROM:${RESEND_FROM_EMAIL:noreply@smartacademiccalendar.com}}
app.mail.send-real-emails=false

# Frontend URL for email links
app.frontend.url=http://localhost:5173
