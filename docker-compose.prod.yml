# ===========================================
# Production Environment - Docker Compose
# ===========================================
# Use for deploying entire stack to production
# 
# Setup:
# 1. Set environment variables on host
# 2. Run: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ============================================
  # DATABASE SERVICE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: smart-academic-calendar-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - smart_calendar_data_prod:/var/lib/postgresql/data
    networks:
      - sap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ============================================
  # BACKEND SERVICE (Spring Boot)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-academic-calendar-backend-prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATASOURCE_USERNAME: ${POSTGRES_USER}
      DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      DATASOURCE_DRIVER: org.postgresql.Driver
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MINUTES: ${JWT_ACCESS_EXPIRATION_MINUTES:-15}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      JWT_REFRESH_EXPIRATION_DAYS_REMEMBER_ME: ${JWT_REFRESH_EXPIRATION_DAYS_REMEMBER_ME:-30}
      # WebAuthn / Passkeys Configuration
      WEBAUTHN_RP_ID: ${DOMAIN}
      WEBAUTHN_ORIGIN: https://${DOMAIN}
      # Resend Email API Configuration
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@smartacademiccalendar.com}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sap-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/users"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ============================================
  # FRONTEND SERVICE (React + Vite)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${DOMAIN}/api
    container_name: smart-academic-calendar-frontend-prod
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - sap-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

# ============================================
# NETWORKS
# ============================================
networks:
  sap-network:
    driver: bridge

# ============================================
# VOLUMES
# ============================================
volumes:
  smart_calendar_data_prod:
